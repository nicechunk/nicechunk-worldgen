name: Bug report
description: Report a reproducible NiceChunk issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps, route, wallet/network state, and expected result.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, commit hash, or environment details.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This report does not include private keys, tokens, passwords, or production server details.
          required: true
