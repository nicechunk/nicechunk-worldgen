<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Deterministic worldgen sampling stack</title>
  <desc id="desc">A layered diagram showing how seed, coordinates, noise fields, biome selection, block lookup, and caches produce deterministic generated blocks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="1" stop-color="#11170d"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#8fdcff"/>
    </marker>
    <style>
      .label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#90ff1a}
      .title{font:850 42px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}
      .copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#b8c7d4}
      .card{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.16);stroke-width:1.2;rx:18}
      .head{font:800 20px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}
      .small{font:600 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#bdd0df}
      .mono{font:750 14px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#f7d98f}
      .line{stroke:#8fdcff;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="214" cy="612" r="280" fill="#00c2ff" opacity=".08"/>
  <circle cx="1080" cy="130" r="260" fill="#83ff00" opacity=".08"/>
  <text x="70" y="78" class="label">WORLDGEN CONTRACT</text>
  <text x="70" y="132" class="title">Seeded terrain is a reproducible sampling stack.</text>
  <text x="70" y="168" class="copy">Every visible block starts from explicit seed and coordinate inputs, then passes through stable terrain and biome functions.</text>

  <g transform="translate(76 244)">
    <rect class="card" width="250" height="120"/>
    <text x="24" y="42" class="head">Inputs</text>
    <text x="24" y="72" class="mono">worldSeed</text>
    <text x="24" y="96" class="mono">x, y, z</text>
  </g>
  <g transform="translate(388 210)">
    <rect class="card" width="250" height="188"/>
    <text x="24" y="42" class="head">Noise fields</text>
    <text x="24" y="74" class="small">continentalness</text>
    <text x="24" y="98" class="small">erosion and rivers</text>
    <text x="24" y="122" class="small">temperature</text>
    <text x="24" y="146" class="small">humidity</text>
    <text x="24" y="170" class="small">volcanic and cave cells</text>
  </g>
  <g transform="translate(700 244)">
    <rect class="card" width="250" height="120"/>
    <text x="24" y="42" class="head">Terrain profile</text>
    <text x="24" y="72" class="small">height, slope, biome</text>
    <text x="24" y="96" class="small">water, vegetation, surface</text>
  </g>
  <g transform="translate(1012 210)">
    <rect class="card" width="202" height="188"/>
    <text x="24" y="42" class="head">Block lookup</text>
    <text x="24" y="74" class="small">surface block</text>
    <text x="24" y="98" class="small">subsurface depth</text>
    <text x="24" y="122" class="small">fluid layer</text>
    <text x="24" y="146" class="small">cave adjacency</text>
    <text x="24" y="170" class="small">vegetation overlay</text>
  </g>
  <path class="line" d="M326 304 H370"/>
  <path class="line" d="M638 304 H682"/>
  <path class="line" d="M950 304 H994"/>

  <g transform="translate(198 478)">
    <rect class="card" width="356" height="118"/>
    <text x="26" y="42" class="head">Cache boundary</text>
    <text x="26" y="74" class="small">profile, height, raw height, base height,</text>
    <text x="26" y="96" class="small">and mountain cells are invalidated on seed change.</text>
  </g>
  <g transform="translate(690 478)">
    <rect class="card" width="392" height="118"/>
    <text x="26" y="42" class="head">Protocol implication</text>
    <text x="26" y="74" class="small">A verifier can recompute generated blocks without</text>
    <text x="26" y="96" class="small">trusting the renderer or a private terrain service.</text>
  </g>
  <path class="line" d="M505 398 C500 438 452 462 400 478"/>
  <path class="line" d="M1108 398 C1088 452 1028 472 980 478"/>
</svg>
